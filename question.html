<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Question Thread</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <a href="index.html">← Back to Home</a>
  </header>
  <main>
    <h2>Question Title</h2>
    <p><strong>Asked by:</strong> Narendar</p>
    <div id="answers">
      <p>Answer 1: JavaScript uses async/await for cleaner asynchronous code.</p>
      <p>Answer 2: Promises help avoid callback hell.</p>
    </div>
    <form id="answerForm">
      <textarea id="answerText" placeholder="Write your answer..." required></textarea>
      <button type="submit">Post Answer</button>
    </form>
  </main>
  <script>
    document.getElementById("answerForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const answer = document.getElementById("answerText").value;
      alert("Answer posted: " + answer);
    });
  </script>
</body>
</html>
